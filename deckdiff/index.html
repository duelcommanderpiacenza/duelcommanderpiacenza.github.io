<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deck Diff</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2.5rem 1.5rem;
    }

    main { max-width: 960px; margin: 0 auto; }

    h1 {
      font-size: 1.8rem;
      color: #c89b3c;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: #888;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    #loading { color: #888; }

    .selectors {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.2rem;
    }

    .selectors label {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    select {
      background: #16213e;
      border: 1px solid #3a3a5a;
      color: #e0e0e0;
      padding: 0.55rem 0.85rem;
      border-radius: 5px;
      font-size: 0.95rem;
      min-width: 300px;
      cursor: pointer;
    }

    select:focus { outline: 2px solid #c89b3c; border-color: transparent; }

    button {
      background: #c89b3c;
      color: #1a1a2e;
      border: none;
      padding: 0.6rem 1.8rem;
      border-radius: 5px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) { background: #d4aa4e; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }


    #error {
      color: #e05252;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    #result { margin-top: 2rem; }

    #result h2 {
      font-size: 1rem;
      color: #aaa;
      font-weight: 400;
      margin-bottom: 1rem;
    }

    #result h2 strong { color: #e0e0e0; }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      background: #16213e;
      padding: 0.6rem 1rem;
      text-align: left;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      border-bottom: 2px solid #2a2a4a;
    }

    tbody td {
      padding: 0.42rem 1rem;
      border-bottom: 1px solid #22223a;
      font-size: 0.9rem;
    }

    tbody tr:last-child td { border-bottom: none; }

    .remove { color: #e07070; }
    .add    { color: #68c47a; }

    .summary {
      margin-top: 1rem;
      color: #777;
      font-size: 0.83rem;
    }

    .identical { color: #888; margin-top: 1rem; }
  </style>
</head>
<body>
  <main>
    <h1>Deck Diff</h1>
    <p class="subtitle">Select two decks to see what to swap to go from one to the other.</p>

    <div id="loading">Loading decks…</div>

    <div id="controls" hidden>
      <div class="selectors">
        <label>
          Deck A — starting deck
          <select id="deckA"></select>
        </label>
        <label>
          Deck B — target deck
          <select id="deckB"></select>
        </label>
      </div>
      <button id="compareBtn">Compare</button>
    </div>

    <div id="error" hidden></div>
    <div id="result" hidden></div>
  </main>

  <script>

    function computeDiff(cardsA, cardsB) {
      const all    = new Set([...Object.keys(cardsA), ...Object.keys(cardsB)]);
      const remove = [], add = [];
      for (const name of [...all].sort()) {
        const qa = cardsA[name] || 0, qb = cardsB[name] || 0;
        if (qa > qb) remove.push([name, qa - qb]);
        else if (qb > qa) add.push([name, qb - qa]);
      }
      return { remove, add };
    }

    function fmt([name, qty]) {
      return qty > 1 ? `${qty}× ${name}` : name;
    }

    function renderTable(remove, add) {
      const rows   = Math.max(remove.length, add.length);
      const totalR = remove.reduce((s, [, q]) => s + q, 0);
      const totalA = add.reduce((s, [, q]) => s + q, 0);

      let html = `<table>
        <thead><tr><th>Cards to remove</th><th>Cards to add</th></tr></thead>
        <tbody>`;
      for (let i = 0; i < rows; i++) {
        const r = i < remove.length ? fmt(remove[i]) : "";
        const a = i < add.length    ? fmt(add[i])    : "";
        html += `<tr>
          <td class="remove">${r}</td>
          <td class="add">${a}</td>
        </tr>`;
      }
      html += `</tbody></table>
        <p class="summary">Remove ${totalR} card(s) · Add ${totalA} card(s)</p>`;
      return html;
    }

    (async () => {
      const $          = id => document.getElementById(id);
      const loading    = $("loading");
      const controls   = $("controls");
      const errorEl    = $("error");
      const resultEl   = $("result");
      const selectA    = $("deckA");
      const selectB    = $("deckB");
      const compareBtn = $("compareBtn");

      function showError(msg) { errorEl.textContent = msg; errorEl.hidden = false; }
      function clearError()   { errorEl.textContent = ""; errorEl.hidden = true; }

      let decks = [];

      try {
        const res = await fetch("decks-data.json");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        decks = await res.json();
        if (!decks.length) throw new Error("Deck data not yet generated — run the GitHub Actions workflow first.");
      } catch (e) {
        loading.textContent = `Failed to load decks: ${e.message}`;
        return;
      }

      for (const deck of decks) {
        for (const sel of [selectA, selectB]) {
          const opt       = document.createElement("option");
          opt.value       = deck.publicId;
          opt.textContent = deck.name;
          sel.appendChild(opt);
        }
      }

      if (selectB.options.length > 1) selectB.selectedIndex = 1;

      loading.hidden  = true;
      controls.hidden = false;

      compareBtn.addEventListener("click", () => {
        clearError();
        resultEl.hidden = true;

        const idA = selectA.value;
        const idB = selectB.value;

        if (idA === idB) { showError("Deck A and Deck B are the same deck."); return; }

        const deckA = decks.find(d => d.publicId === idA);
        const deckB = decks.find(d => d.publicId === idB);

        if (deckA.cardCount !== deckB.cardCount) {
          showError(`Different card counts: "${deckA.name}" has ${deckA.cardCount}, "${deckB.name}" has ${deckB.cardCount}.`);
          return;
        }

        const { remove, add } = computeDiff(deckA.cards, deckB.cards);

        if (!remove.length && !add.length) {
          resultEl.innerHTML = `<p class="identical">These decks are identical — nothing to change.</p>`;
        } else {
          resultEl.innerHTML = `
            <h2><strong>${deckA.name}</strong> → <strong>${deckB.name}</strong></h2>
            ${renderTable(remove, add)}
          `;
        }
        resultEl.hidden = false;
      });
    })();
  </script>
</body>
</html>
