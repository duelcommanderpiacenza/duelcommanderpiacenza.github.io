<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Duel Commander Piacenza</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <img src="dc_pc.png" alt="Duel Commander Piacenza logo" class="site-logo">
  <h1>Duel Commander Piacenza</h1>
</header>

<div class="social-strip" aria-label="Social links">
  <a class="social-link" href="https://moxfield.com/users/Duel_Commander_Piacenza" target="_blank" rel="noopener noreferrer" aria-label="Moxfield">
    <img src="moxfield.png" alt="Moxfield">
  </a>
  <a class="social-link" href="https://www.youtube.com/@DuelCommanderPiacenza" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
    <img src="youtube.png" alt="YouTube">
  </a>
  <a class="social-link" href="https://www.facebook.com/profile.php?id=61573570860576" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
    <img src="facebook.png" alt="Facebook">
  </a>
  <a class="social-link" href="https://www.instagram.com/duelcommanderpiacenza/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
    <img src="instagram.png" alt="Instagram">
  </a>
</div>

<main>

  <div class="overview-grid">
    <section class="card overview-card">
      <div class="section-heading">
        <h2>Latest Decks</h2>
        <div id="deck-filters-slot"></div>
      </div>
      <div id="decks">Loading decks...</div>
    </section>

    <section class="card overview-card">
      <div class="section-heading">
        <h2>Latest Videos</h2>
        <div id="video-filters-slot"></div>
      </div>
      <div id="videos">Loading videos...</div>
    </section>
  </div>

</main>

<footer>
  &copy; 2026 Duel Commander Piacenza
</footer>

<script src="moxfield.js"></script>

</body>
</html>
