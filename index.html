<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Duel Commander Piacenza</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: #e2e8f0;
    }

    header {
      background: #020617;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #1e293b;
    }

    h1 {
      margin: 0;
      font-size: 2em;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: #38bdf8;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      padding: 40px 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #020617;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      border: 1px solid #1e293b;
    }

    .button {
      display: inline-block;
      padding: 10px 15px;
      background: #38bdf8;
      color: #020617;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #1e293b;
      font-size: 0.9em;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>
  <h1>Duel Commander Piacenza</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Events</a>
    <a href="#">Decks</a>
    <a href="#">Videos</a>
  </nav>
</header>

<div class="container">

  <div class="card">
    <h2>Welcome</h2>
    <p>
      This is the official Duel Commander league page.
      Follow tournaments, check decks, and watch matches.
    </p>
  </div>

  <div class="card">
    <h2>Next Event</h2>
    <p>Coming soon 👀</p>
    <a class="button" href="#">Join the League</a>
  </div>

  <div class="card">
    <h2>Latest Video</h2>
    <p>Check out our latest match on YouTube:</p>

    <iframe width="100%" height="315"
      src="https://www.youtube.com/embed/dQw4w9WgXcQ"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>

</div>

<footer>
  © 2026 Duel Commander Piacenza
</footer>

</body>
</html>
