name: Fetch Moxfield Decks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # optional: runs every hour

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Moxfield API
        run: |
          set -e

          URL="https://api.moxfield.com/v2/users/Duel_Commander_Piacenza/decks"

          echo "Fetching: $URL"
          RESPONSE=$(curl -s "$URL")

          echo "$RESPONSE" > raw.json

          echo "Validating JSON..."
          echo "$RESPONSE" | jq '.' > /dev/null

          echo "Transforming data..."

          echo "$RESPONSE" | jq '
            .data | map({
              id: .id,
              name: .name,
              format: .format,
              url: .publicUrl,
              publicId: .publicId,
              colors: .colors,
              colorIdentity: .colorIdentity,
              commander: .mainCardId,
              createdAt: .createdAtUtc,
              updatedAt: .lastUpdatedAtUtc,
              mainboardCount: .mainboardCount
            })
          ' > decks.json

          echo "Output preview:"
          cat decks.json

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: moxfield-decks
          path: decks.json