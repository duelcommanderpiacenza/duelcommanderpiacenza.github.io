name: Fetch Moxfield Decks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # optional: runs every hour

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Moxfield API
        run: |
          set -euo pipefail

          URL="https://api.moxfield.com/v2/users/Duel_Commander_Piacenza/decks"
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36"

          echo "Fetching: $URL"
          HTTP_CODE=$(curl --silent --show-error \
            -H 'Accept: application/json, text/plain, */*' \
            -H 'Referer: https://moxfield.com/' \
            -H "User-Agent: $USER_AGENT" \
            "$URL" \
            -w '%{http_code}' \
            -o raw.json)

          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Unexpected response body preview:"
            head -c 500 raw.json || true
            exit 1
          fi

          echo "Validating JSON structure..."
          jq -e '.data | arrays' raw.json > /dev/null

          echo "Transforming data..."
          jq '
            .data | map({
              id: .id,
              name: .name,
              format: .format,
              url: .publicUrl,
              publicId: .publicId,
              colors: .colors,
              colorIdentity: .colorIdentity,
              commander: .mainCardId,
              createdAt: .createdAtUtc,
              updatedAt: .lastUpdatedAtUtc,
              mainboardCount: .mainboardCount
            })
          ' raw.json > decks.json

          echo "Output preview:"
          cat decks.json

      - name: Upload result artifact
        uses: actions/upload-artifact@v6
        with:
          name: moxfield-decks
          path: decks.json
