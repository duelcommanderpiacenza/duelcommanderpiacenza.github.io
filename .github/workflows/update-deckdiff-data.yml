name: Update Deckdiff Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write

jobs:
  update-deckdiff-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch full deck data from Moxfield
        env:
          MOXFIELD_USER_AGENT: ${{ secrets.MOXFIELD_USER_AGENT }}
        run: node scripts/update-deckdiff-data.mjs

      - name: Commit updated deck data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deckdiff/decks-data.json
          git diff --cached --quiet && exit 0
          git commit -m "Update deckdiff data"
          git push
