name: Update Site Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  update-site-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest decks from Moxfield
        env:
          MOXFIELD_USER_AGENT: ${{ secrets.MOXFIELD_USER_AGENT }}
        run: node scripts/update-latest-decks.mjs

      - name: Fetch latest videos from YouTube
        run: node scripts/update-latest-videos.mjs

      - name: Commit updated site data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add decks.json videos.json
          git diff --cached --quiet && exit 0
          git commit -m "Update latest site data"
          git push
